# Render Blueprint — deploy web app + use existing Postgres
# Docs: https://render.com/docs/blueprint-spec
#
# Before deploy:
# 1. Create/link Postgres on Render (or use existing dpg-... instance)
# 2. Run locally: npm run db:push-render && npm run db:seed-hr-render
# 3. Set AUTH_SECRET in Render dashboard (openssl rand -base64 32)

services:
  - type: web
    name: school-management-system
    runtime: node
    plan: free
    buildCommand: npm install && npx prisma generate && npm run build
    startCommand: npm start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      # Prefer linking Postgres in dashboard, then set DATABASE_URL manually:
      # Internal URL + ?schema=school_sms (NOT External — External is for laptop sync only)
      # Example: postgresql://user:pass@dpg-xxx-a/dbname?schema=school_sms
      - key: DATABASE_URL
        sync: false
      - key: AUTH_SECRET
        sync: false
      # Public app URL — must match your Render URL exactly (https, no trailing slash)
      - key: NEXTAUTH_URL
        sync: false
      - key: AUTH_URL
        sync: false
      - key: AUTH_TRUST_HOST
        value: "true"
      # Ollama private service — auto-wired when school-sms-ollama is deployed (see docs/OLLAMA-AI-TUTOR.md)
      - key: OLLAMA_HOSTPORT
        fromService:
          type: pserv
          name: school-sms-ollama
          property: hostport
      # Optional manual override, e.g. http://school-sms-ollama:11434
      - key: OLLAMA_BASE_URL
        sync: false
      - key: OLLAMA_MODEL
        value: qwen2.5:7b
      - key: AI_TUTOR_ENABLED
        value: "true"
      - key: AI_TUTOR_FALLBACK_MOCK
        value: "true"
      - key: OLLAMA_TIMEOUT_MS
        value: "120000"
      - key: OLLAMA_STREAM_IDLE_TIMEOUT_MS
        value: "45000"
      - key: OLLAMA_NUM_PREDICT
        value: "140"
      - key: OLLAMA_NUM_CTX
        value: "3072"
      - key: OLLAMA_MAX_HISTORY
        value: "8"
      - key: OLLAMA_KEEP_ALIVE
        value: "15m"

  # Ollama LLM — private service (not public). Requires Starter+ plan for most models.
  - type: pserv
    name: school-sms-ollama
    runtime: docker
    dockerfilePath: ./docker/ollama/Dockerfile
    # llama/qwen 7–8B needs ~4GB+ RAM; Starter (512MB) will OOM — use standard or higher
    plan: standard
    envVars:
      - key: OLLAMA_HOST
        value: 0.0.0.0:11434

databases:
  - name: school-sms-db
    plan: free
    databaseName: health_system_2pbp
    # If using an EXISTING Render Postgres, skip creating this and set DATABASE_URL manually:
    # postgresql://USER:PASS@HOST/DB?sslmode=require&schema=school_sms
