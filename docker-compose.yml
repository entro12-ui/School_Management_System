services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: school_management
    ports:
      - "5434:5432"
    volumes:
      - school_sms_pg:/var/lib/postgresql/data

volumes:
  school_sms_pg:
